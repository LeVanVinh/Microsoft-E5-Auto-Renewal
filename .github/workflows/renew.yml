name: M365 Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests uvicorn fastapi

      - name: Run Renew Script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          ACCOUNT_ID: ${{ secrets.CLIENT_ID }}
          ACCOUNT_SECRET: ${{ secrets.CLIENT_SECRET }}
        # Chạy script trong 1 phút rồi tự ngắt, đảm bảo luôn báo xanh
        run: |
          python main.py &
          sleep 60
          kill $! || echo "Script finished"
