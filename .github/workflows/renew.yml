name: M365 Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests uvicorn fastapi quart httpx

      - name: Run and Activate Script
        env:
          # Truyền các Secret vào đúng tên biến môi trường mà config.py yêu cầu
          E5_CLIENT_ID: ${{ secrets.E5_CLIENT_ID }}
          E5_CLIENT_SECRET: ${{ secrets.E5_CLIENT_SECRET }}
          E5_REFRESH_TOKEN: ${{ secrets.E5_REFRESH_TOKEN }}
          E5_WEB_APP_PASSWORD: ${{ secrets.E5_WEB_APP_PASSWORD }}
          PORT: 8080
        run: |
          # 1. Khởi chạy server ngầm
          python main.py & 
          
          # 2. Chờ 15 giây để server khởi động và đọc config
          sleep 15 
          
          # 3. Gửi lệnh POST kèm mật khẩu để kích hoạt hàm call_endpoints
          curl -X POST http://127.0.0.1:8080/call \
          -H "Content-Type: application/json" \
          -d "{\"password\": \"${{ secrets.E5_WEB_APP_PASSWORD }}\", \"refresh_token\": \"${{ secrets.E5_REFRESH_TOKEN }}\"}"
          
          # 4. Để script chạy trong 60 giây rồi đóng
          sleep 60
          kill $! || echo "Gia hạn thành công"
