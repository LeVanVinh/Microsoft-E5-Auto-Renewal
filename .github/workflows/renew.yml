name: M365 Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests uvicorn fastapi quart httpx

      - name: Run and Activate Script
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          # Lấy các thông tin mật khẩu và token từ Secret bạn đã cài
          WEB_PASSWORD: ${{ secrets.WEB_APP_PASSWORD }}
          MS_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          # 1. Bật server chạy ngầm
          python main.py & 
          
          # 2. Đợi 10 giây cho server khởi động
          sleep 10 
          
          # 3. Tự gửi lệnh POST để kích hoạt quá trình gia hạn
          curl -X POST http://127.0.0.1:8080/call \
          -H "Content-Type: application/json" \
          -d "{\"password\": \"$WEB_PASSWORD\", \"refresh_token\": \"$MS_REFRESH_TOKEN\"}"
          
          # 4. Đợi 60 giây để script hoàn thành gọi 18 API Microsoft
          sleep 60
          kill $! || echo "Gia hạn hoàn tất"
